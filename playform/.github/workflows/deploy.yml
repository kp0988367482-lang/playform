name: 自動化部署 - Firebase 和 Google Cloud

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'  # 每日 UTC 2:00
  workflow_dispatch:  # 允許手動觸發

# GitHub Secrets 配置:
# FIREBASE_TOKEN       — firebase login:ci 生成的令牌
# FIREBASE_PROJECT_ID  — playform-prod
# GCP_PROJECT_ID       — playform-api-prod
# GCP_SA_KEY           — Google Cloud 服務帳戶金鑰 (JSON)
# DATABASE_URL         — PostgreSQL 連接字符串
# OPENAI_API_KEY       — OpenAI API 密鑰

jobs:
  test:
    name: 測試
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: 設置 Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 緩存 pip 依賴
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: 安裝依賴
        run: |
          cd apps/core/backend
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: 執行單元測試
        run: |
          cd apps/core/backend
          pytest --cov=. --cov-report=xml
      
      - name: 上傳覆蓋率報告
        uses: codecov/codecov-action@v3
        with:
          file: ./apps/core/backend/coverage.xml

  deploy-firebase:
    name: 部署到 Firebase
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: 設置 Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 設置 Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 構建 React 前端
        run: |
          cd apps/core/frontend
          npm install
          npm run build
      
      - name: Google 認證 (Firebase)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 安裝 Firebase CLI
        run: npm install -g firebase-tools
      
      - name: 部署到 Firebase Hosting
        run: |
          firebase deploy \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --only hosting,functions

  deploy-gcloud:
    name: 部署到 Google Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Google 認證
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 設置 gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
      
      - name: 設置 Docker 認證
        run: |
          gcloud auth configure-docker gcr.io
      
      - name: 構建和推送 Docker 映像
        run: |
          docker build \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/playform-api:${{ github.sha }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/playform-api:latest \
            -f apps/core/backend/Dockerfile \
            apps/core/backend/
          
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/playform-api:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/playform-api:latest
      
      - name: 部署到 Cloud Run
        run: |
          gcloud run deploy playform-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/playform-api:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars "\
              FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }},\
              DATABASE_URL=${{ secrets.DATABASE_URL }},\
              OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            --memory 512Mi \
            --cpu 1 \
            --timeout 3600

  security-scan:
    name: 安全掃描
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: 執行 Trivy 漏洞掃描
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: 上傳 SARIF 報告
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  notify:
    name: 通知部署狀態
    runs-on: ubuntu-latest
    needs: [test, deploy-firebase, deploy-gcloud]
    if: always()
    
    steps:
      - name: 部署成功通知
        if: success()
        run: |
          echo "✅ 所有部署已完成！"
          echo "Firebase Hosting: https://playform-prod.web.app"
          echo "Cloud Run API: https://playform-api-xxxxx.run.app"
      
      - name: 部署失敗通知
        if: failure()
        run: |
          echo "❌ 部署失敗，請檢查日誌"

      - name: Deploy (Railway / Firebase Functions)
        run: |
          echo "✅ Backend deploy step"
          echo "Configure RAILWAY_TOKEN or FIREBASE_TOKEN in GitHub Secrets"
          # railway up  ← Uncomment when Railway is connected
          # firebase deploy --only functions --token ${{ secrets.FIREBASE_TOKEN }}
